<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #FFF3B0, #FFD6E0);
  color: #555;
}

/* SECTION */
section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 15px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 8px 15px rgba(0,0,0,0.1);
  max-width: 90%;
}

/* TEXT RESPONSIVE */
h1 {
  font-size: 22px;
}
h2 {
  font-size: 18px;
}
p {
  font-size: 14px;
  line-height: 1.6;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #FFD6E0;
  cursor: pointer;
  font-size: 14px;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}
.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* IMAGE */
img {
  width: 100%;
  max-width: 200px;
  border-radius: 15px;
}

/* BALLOON */
.balloon {
  width: 60px;
  animation: float 3s infinite;
}
@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-15px);}
  100% {transform: translateY(0);}
}
</style>
</head>

<body>

<script>
// SCROLL
function scrollToSection(n) {
  document.querySelectorAll("section")[n].scrollIntoView({
    behavior: 'smooth'

}

// FADE
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 50) {
      el.classList.add('show');
    }
  });
});
